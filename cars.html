<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Indian Inventory | DriveX</title>
</head>
<body>
    <nav>
        <div class="logo">DRIVEX</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cars.html">Inventory</a></li>
            <li><a href="brands.html">Brands</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="section-title">Current Indian Lineup</h2>
        <div class="grid">
            <div class="card car-card">
                <div class="price-tag">₹8.15 Lakh+</div>
                <img src="images/nexon.avif" alt="Tata Nexon">
                <div class="card-info">
                    <h3>Tata Nexon (ICE + EV)</h3>
                    <div class="specs">
                        <span><i class="fas fa-shield-alt"></i> 5-Star Safety</span>
                        <span><i class="fas fa-bolt"></i> EV/Petrol</span>
                    </div>
                    <button class="btn">View Dealerships</button>
                </div>
            </div>

            <div class="card car-card">
                <div class="price-tag">₹11.35 Lakh+</div>
                <img src="images/AX7L_EverestWhite_1366x443.png" alt="Mahindra Thar">
                <div class="card-info">
                    <h3>Mahindra Thar Roxx</h3>
                    <div class="specs">
                        <span><i class="fas fa-mountain"></i> 4x4 Drive</span>
                        <span><i class="fas fa-gas-pump"></i> Diesel</span>
                    </div>
                    <button class="btn">View Dealerships</button>
                </div>
            </div>

            <div class="card car-card">
                <div class="price-tag">₹8.18 Lakh</div>
                <img src="images/maruti.png" alt="Maruti Suzuki">
                <div class="card-info">
                    <h3>Maruti Wagon R</h3>
                    <div class="specs">
                        <span><i class="fas fa-leaf"></i> Manual</span>
                        <span><i class="fas fa-history"></i> 5 Seater</span>
                    </div>
                    <button class="btn">View Dealerships</button>
                </div>
            </div>

            <div class="card car-card">
                <div class="price-tag">₹13.99 Lakh+</div>
                <img src="images/mahinra.webp" alt="XUV700">
                <div class="card-info">
                    <h3>Mahindra XUV 7XO</h3>
                    <div class="specs">
                        <span><i class="fas fa-robot"></i> ADAS L2</span>
                        <span><i class="fas fa-users"></i> 7 Seater</span>
                    </div>
                    <button class="btn">View Dealerships</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
